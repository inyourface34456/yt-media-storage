name: Build

on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

env:
  VCPKG_BINARY_SOURCES: 'clear;x-gha,readwrite'

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            os: ubuntu-22.04
            triplet: x64-linux
            msvc_arch: ''
            build_gui: 'ON'
            qt_source: 'vcpkg'
          - name: linux-arm64
            os: ubuntu-22.04-arm
            triplet: arm64-linux
            msvc_arch: ''
            build_gui: 'ON'
            qt_source: 'system'
          - name: windows-x64
            os: windows-2022
            triplet: x64-windows-static
            msvc_arch: x64
            build_gui: 'ON'
            qt_source: 'vcpkg'
          - name: windows-x86
            os: windows-2022
            triplet: x86-windows-static
            msvc_arch: x86
            build_gui: 'ON'
            qt_source: 'vcpkg'
          - name: windows-arm64
            os: windows-11-arm
            triplet: arm64-windows-static
            msvc_arch: arm64
            build_gui: 'ON'
            qt_source: 'vcpkg'
          - name: macos-x64
            os: macos-15-intel
            triplet: x64-osx
            msvc_arch: ''
            build_gui: 'ON'
            qt_source: 'vcpkg'
          - name: macos-arm64
            os: macos-14
            triplet: arm64-osx
            msvc_arch: ''
            build_gui: 'ON'
            qt_source: 'vcpkg'

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Export GitHub Actions cache env
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ninja-build nasm yasm autoconf autoconf-archive automake libtool pkg-config \
            libxkbcommon-dev libxkbcommon-x11-dev libxcb1-dev libxcb-cursor-dev \
            libxcb-icccm4-dev libxcb-image0-dev libxcb-keysyms1-dev libxcb-randr0-dev \
            libxcb-render-util0-dev libxcb-shape0-dev libxcb-sync-dev libxcb-util-dev \
            libxcb-xfixes0-dev libxcb-xkb-dev libxcb-render0-dev libxcb-glx0-dev \
            libxcb-xinput-dev \
            libgl1-mesa-dev libglu1-mesa-dev libfontconfig1-dev libfreetype6-dev \
            libdbus-1-dev libxext-dev libxfixes-dev libxi-dev libxrender-dev \
            libx11-xcb-dev libsm-dev libice-dev \
            libegl-dev libgles-dev libopengl-dev libwayland-dev wayland-protocols \
            libxcomposite-dev libxcursor-dev libxdamage-dev libxinerama-dev \
            libxshmfence-dev libxtst-dev libxss-dev libinput-dev libmtdev-dev

      - name: Install system Qt6 (Linux ARM64)
        if: matrix.qt_source == 'system'
        run: |
          sudo apt-get install -y qt6-base-dev qt6-base-dev-tools libqt6opengl6-dev

      - name: Install macOS deps
        if: runner.os == 'macOS'
        run: |
          brew install ninja nasm yasm automake autoconf autoconf-archive libtool pkg-config libomp
          LIBOMP_PREFIX="$(brew --prefix libomp)"
          {
            echo "OpenMP_ROOT=${LIBOMP_PREFIX}"
            echo "CMAKE_PREFIX_PATH=${LIBOMP_PREFIX}"
            echo "LDFLAGS=-L${LIBOMP_PREFIX}/lib"
            echo "CPPFLAGS=-I${LIBOMP_PREFIX}/include"
          } >> "$GITHUB_ENV"

      - name: Set up MSVC environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.msvc_arch }}

      - name: Install Ninja (Windows)
        if: runner.os == 'Windows'
        uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Install pkg-config (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install pkgconfiglite -y --no-progress
          pkg-config --version

      - name: Bootstrap vcpkg
        shell: bash
        run: |
          BASELINE=$(awk -F'"' '/builtin-baseline/ {print $4}' vcpkg.json)
          if [ "$BASELINE" = "REPLACE_WITH_VCPKG_COMMIT_HASH" ]; then
            echo "::error::vcpkg.json builtin-baseline is unset. Pin it to a real vcpkg commit hash."
            exit 1
          fi
          if [ ! -d "$HOME/vcpkg/.git" ]; then
            git clone https://github.com/microsoft/vcpkg.git "$HOME/vcpkg"
          fi
          git -C "$HOME/vcpkg" fetch --depth=1 origin "$BASELINE"
          git -C "$HOME/vcpkg" checkout "$BASELINE"
          if [ "$RUNNER_OS" = "Windows" ]; then
            "$HOME/vcpkg/bootstrap-vcpkg.bat" -disableMetrics
          else
            "$HOME/vcpkg/bootstrap-vcpkg.sh" -disableMetrics
          fi
          echo "VCPKG_ROOT=$HOME/vcpkg" >> "$GITHUB_ENV"

      - name: Configure
        shell: bash
        run: |
          MANIFEST_FEATURES=""
          if [ "${{ matrix.build_gui }}" = "ON" ] && [ "${{ matrix.qt_source }}" = "vcpkg" ]; then
            MANIFEST_FEATURES="gui"
          fi
          cmake -B build -S . -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE="$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" \
            -DVCPKG_TARGET_TRIPLET=${{ matrix.triplet }} \
            -DVCPKG_MANIFEST_MODE=ON \
            -DVCPKG_MANIFEST_FEATURES="$MANIFEST_FEATURES" \
            -DMEDIA_STORAGE_STATIC_BINARIES=ON \
            -DBUILD_GUI=${{ matrix.build_gui }} \
            -DBUILD_TESTS=OFF

      - name: Build
        shell: bash
        run: cmake --build build --parallel

      - name: Stage artifacts
        shell: bash
        run: |
          mkdir -p dist
          if [ "$RUNNER_OS" = "Windows" ]; then
            cp build/media_storage.exe "dist/media_storage-${{ matrix.name }}.exe"
            if [ "${{ matrix.build_gui }}" = "ON" ]; then
              cp build/media_storage_gui.exe "dist/media_storage_gui-${{ matrix.name }}.exe"
            fi
          else
            cp build/media_storage "dist/media_storage-${{ matrix.name }}"
            if [ "${{ matrix.build_gui }}" = "ON" ]; then
              cp build/media_storage_gui "dist/media_storage_gui-${{ matrix.name }}"
            fi
          fi
          ls -la dist/

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: media_storage-${{ matrix.name }}
          path: dist/*
          if-no-files-found: error

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
